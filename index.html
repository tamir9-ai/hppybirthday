<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myheartq</title>
    <style>
        body {
            background-color: #ffdae0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            overflow: hidden;
        }

        /* Бялуу унаж орж ирэх анимаци */
        .cake-container {
            position: relative;
            animation: dropBounce 1.5s ease-out forwards;
        }

        @keyframes dropBounce {
            0% { transform: translateY(-500px); opacity: 0; }
            60% { transform: translateY(20px); opacity: 1; }
            80% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        .cake {
            position: relative;
            width: 200px;
            height: 150px;
        }

        .plate {
            width: 240px;
            height: 15px;
            background: #e0e0e0;
            position: absolute;
            bottom: -10px;
            left: -20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .layer {
            position: absolute;
            width: 200px;
            height: 60px;
            background: #f0e4d0;
            border-radius: 10px 10px 0 0;
            bottom: 0;
        }

        .layer-top {
            bottom: 50px;
            height: 50px;
            background: #6b3e2e;
        }

        .icing {
            position: absolute;
            top: 40px;
            width: 200px;
            height: 25px;
            background: #fff;
            border-radius: 0 0 20px 20px;
        }

        /* Лаа унаж орж ирэх (Бялуунаас арай хоцорч) */
        .candle {
            position: absolute;
            bottom: 100px;
            left: 90px;
            width: 20px;
            height: 50px;
            background: #fff;
            border-top: 5px solid #ff4d4d;
            animation: dropBounce 1.2s ease-out 0.5s backwards;
        }

        .flame {
            position: absolute;
            top: -20px;
            left: 5px;
            width: 10px;
            height: 20px;
            background: #ffcc00;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 0 15px #ffcc00;
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.1); opacity: 1; }
        }

        /* Текст */
        .happy-birthday {
            margin-top: 40px;
            font-size: 3em;
            color: #c2185b;
            font-family: 'Brush Script MT', cursive;
            opacity: 0;
            animation: fadeIn 1s forwards 1.8s;
            text-align: center;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* Конфети */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="cake-container">
        <div class="cake">
            <div class="plate"></div>
            <div class="layer"></div>
            <div class="layer layer-top"></div>
            <div class="icing"></div>
            <div class="candle">
                <div class="flame"></div>
            </div>
        </div>
    </div>

    <h1 class="happy-birthday">Happy Birthday my Love!</h1>

    <script>
        function createConfetti() {
            const colors = ['#ff4d4d', '#ffcc00', '#33ccff', '#99ff33', '#ff33cc'];
            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 5 + 's';
                confetti.style.width = Math.random() * 10 + 5 + 'px';
                confetti.style.height = confetti.style.width;
                document.body.appendChild(confetti);
            }
        }
        // Анимаци эхлэхэд конфетиг бага зэрэг хожимдуулж ажиллуулна
        setTimeout(createConfetti, 1000);
    </script>
</body>
</html>
